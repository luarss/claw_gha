name: OpenClaw Agent

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger
    inputs:
      message:
        description: 'Message to send to agent'
        required: true
        default: 'Continue working on tasks'

concurrency:
  group: openclaw-agent
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: openclaw-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            openclaw-${{ runner.os }}-

      - name: Install OpenClaw
        run: npm install -g openclaw@latest

      - name: Configure OpenClaw
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
        run: |
          mkdir -p ~/.openclaw/workspace
          # Copy memory files to workspace
          cp -r memory/* ~/.openclaw/workspace/ || true
          # Generate config from template
          export HOME
          envsubst < config/openclaw.json.template > ~/.openclaw/openclaw.json

      - name: Start Gateway (background)
        run: |
          openclaw gateway --port 18789 &
          # Health check with timeout (replaces fixed sleep)
          for i in {1..30}; do
            if curl -s http://localhost:18789/health > /dev/null 2>&1; then
              echo "Gateway ready after ${i} attempts"
              break
            fi
            sleep 0.1
          done

      - name: Run Agent
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          MESSAGE: ${{ github.event.inputs.message || 'Check for updates and continue tasks' }}
        run: |
          openclaw agent --session-id stock-picker --message "$MESSAGE" --thinking high

      - name: Sync Memory Back
        run: |
          # Sync updated memory back to repo (incremental)
          rsync -a --delete ~/.openclaw/workspace/ memory/ 2>/dev/null || true

      - name: Commit Memory Changes
        run: |
          git config user.name "OpenClaw Agent"
          git config user.email "openclaw@users.noreply.github.com"
          # Only commit if memory actually changed
          if git diff --quiet memory/; then
            echo "No memory changes to commit"
          else
            git add memory/
            git commit -m "chore: update memory [skip ci]"
            git push
          fi
