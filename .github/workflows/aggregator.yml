name: Aggregator Agent

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to agent'
        required: true
        default: 'Aggregate research queue and update priority ideas'

concurrency:
  group: aggregator-agent
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
  OTEL_SERVICE_NAME: openclaw-aggregator-gha

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix '~/.npm-global'
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH
          echo "NODE_PATH=$HOME/.npm-global/lib/node_modules" >> $GITHUB_ENV
          npm install -g openclaw@latest
          npm install -g @opentelemetry/api @opentelemetry/api-logs @opentelemetry/sdk-node @opentelemetry/sdk-metrics @opentelemetry/sdk-logs @opentelemetry/sdk-trace-base @opentelemetry/resources @opentelemetry/semantic-conventions @opentelemetry/exporter-trace-otlp-proto @opentelemetry/exporter-metrics-otlp-proto @opentelemetry/exporter-logs-otlp-proto

      - name: Install Xvfb and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb chromium-browser

      - name: Start Xvfb
        run: Xvfb :99 -screen 0 1920x1080x24 &

      - name: Sanitize Input
        env:
          RAW_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          SANITIZED=$(echo "$RAW_MESSAGE" | sed 's/[`$\\]//g' | tr -d '\n' | head -c 1000)
          echo "MESSAGE=${SANITIZED:-Aggregate research queue and update priority ideas}" >> $GITHUB_ENV

      - name: Configure OpenClaw
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINANCIALDATA_API_KEY: ${{ secrets.FINANCIALDATA_API_KEY }}
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          GATEWAY_PORT: 18789
        run: |
          mkdir -p ~/.openclaw/workspace-aggregator
          # Copy agent-specific memory
          if [ -d "memory/aggregator" ] && [ "$(ls -A memory/aggregator 2>/dev/null)" ]; then
            cp -r memory/aggregator/* ~/.openclaw/workspace-aggregator/
          fi
          # Copy shared memory files for read/write access
          cp memory/research-queue.md ~/.openclaw/workspace-aggregator/ 2>/dev/null || echo "Creating empty research-queue.md"
          cp memory/priority-ideas.md ~/.openclaw/workspace-aggregator/ 2>/dev/null || echo "Creating empty priority-ideas.md"
          cp memory/market-conditions.md ~/.openclaw/workspace-aggregator/ 2>/dev/null || echo "Creating empty market-conditions.md"
          # Copy skills
          cp -r memory/skills ~/.openclaw/workspace-aggregator/ 2>/dev/null || true
          export HOME
          envsubst < config/openclaw.json.template > ~/.openclaw/openclaw.json

      - name: Start Gateway
        run: |
          openclaw gateway --port 18789 &
          for i in {1..30}; do
            if curl -s "http://localhost:18789/health" > /dev/null 2>&1; then
              echo "Gateway is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: Gateway failed to start after 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Run Agent
        timeout-minutes: 15
        env:
          DISPLAY: :99
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINANCIALDATA_API_KEY: ${{ secrets.FINANCIALDATA_API_KEY }}
        run: |
          openclaw agent --session-id aggregator --message "$MESSAGE" --thinking high

      - name: Sync Memory Back
        run: |
          # Sync agent-specific memory
          if [ -d ~/.openclaw/workspace-aggregator ] && [ "$(ls -A ~/.openclaw/workspace-aggregator 2>/dev/null)" ]; then
            cp -r ~/.openclaw/workspace-aggregator/* memory/aggregator/ 2>/dev/null || echo "Warning: Some files could not be copied"
          fi
          # Sync shared files back to repo
          cp ~/.openclaw/workspace-aggregator/research-queue.md memory/research-queue.md 2>/dev/null || echo "No research-queue.md to sync"
          cp ~/.openclaw/workspace-aggregator/priority-ideas.md memory/priority-ideas.md 2>/dev/null || echo "No priority-ideas.md to sync"

      - name: Commit Memory Changes
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update aggregator memory [skip ci]'
          commit_user_name: 'OpenClaw Agent'
          commit_user_email: 'openclaw@users.noreply.github.com'
          file_pattern: 'memory/aggregator/ memory/research-queue.md memory/priority-ideas.md'

      - name: Upload Diagnostic Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aggregator-logs-${{ github.run_id }}
          path: /tmp/openclaw/openclaw-*.log
          retention-days: 7
