name: Stock Picker Agent

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to agent'
        required: true
        default: 'Continue stock analysis and update picks'

concurrency:
  group: stock-picker-agent
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-agent:
    uses: ./.github/workflows/_agent-template.yml
    with:
      session-id: stock-picker
      default-message: 'Continue stock analysis and update picks'
      workspace-name: workspace
      memory-path: memory
      commit-message: 'chore: update memory [skip ci]'
      commit-user-name: 'OpenClaw Agent'
      commit-user-email: 'openclaw@users.noreply.github.com'
      otel-service-name: openclaw-stock-picker-gha
    secrets: inherit
