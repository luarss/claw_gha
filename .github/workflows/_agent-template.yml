name: Agent Template

on:
  workflow_call:
    inputs:
      session-id:
        required: true
        type: string
      default-message:
        required: true
        type: string
      workspace-name:
        required: true
        type: string
      memory-path:
        required: true
        type: string
      additional-sync-paths:
        required: false
        type: string
        default: ''
      commit-message:
        required: true
        type: string
      commit-user-name:
        required: true
        type: string
      commit-user-email:
        required: true
        type: string
      otel-service-name:
        required: true
        type: string
      tool-profile:
        required: false
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
  OTEL_SERVICE_NAME: ${{ inputs.otel-service-name }}

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix '~/.npm-global'
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH
          echo "NODE_PATH=$HOME/.npm-global/lib/node_modules" >> $GITHUB_ENV
          npm install -g openclaw@latest
          npm install -g @opentelemetry/api @opentelemetry/api-logs @opentelemetry/sdk-node @opentelemetry/sdk-metrics @opentelemetry/sdk-logs @opentelemetry/sdk-trace-base @opentelemetry/resources @opentelemetry/semantic-conventions @opentelemetry/exporter-trace-otlp-proto @opentelemetry/exporter-metrics-otlp-proto @opentelemetry/exporter-logs-otlp-proto

      - name: Install Xvfb and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb chromium-browser

      - name: Start Xvfb
        run: Xvfb :99 -screen 0 1920x1080x24 &

      - name: Sanitize Input
        env:
          RAW_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          SANITIZED=$(echo "$RAW_MESSAGE" | sed 's/[`$\\]//g' | tr -d '\n' | head -c 1000)
          echo "MESSAGE=${SANITIZED:-${{ inputs.default-message }}}" >> $GITHUB_ENV

      - name: Configure OpenClaw
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINANCIALDATA_API_KEY: ${{ secrets.FINANCIALDATA_API_KEY }}
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          GATEWAY_PORT: 18789
        run: |
          mkdir -p ~/.openclaw/${{ inputs.workspace-name }}
          if [ -d "${{ inputs.memory-path }}" ] && [ "$(ls -A ${{ inputs.memory-path }} 2>/dev/null)" ]; then
            cp -r ${{ inputs.memory-path }}/* ~/.openclaw/${{ inputs.workspace-name }}/
          else
            echo "Warning: No memory files to sync"
          fi
          # Copy additional sync paths to workspace
          for path in ${{ inputs.additional-sync-paths }}; do
            if [ -f "$path" ]; then
              cp "$path" ~/.openclaw/${{ inputs.workspace-name }}/
            elif [ -d "$path" ]; then
              cp -r "$path" ~/.openclaw/${{ inputs.workspace-name }}/
            fi
          done
          export HOME
          envsubst < config/openclaw.json.template > ~/.openclaw/openclaw.json

      - name: Start Gateway
        run: |
          openclaw gateway --port 18789 &
          for i in {1..30}; do
            if curl -s "http://localhost:18789/health" > /dev/null 2>&1; then
              echo "Gateway is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: Gateway failed to start after 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Run Agent
        timeout-minutes: 15
        env:
          DISPLAY: :99
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINANCIALDATA_API_KEY: ${{ secrets.FINANCIALDATA_API_KEY }}
        run: |
          TOOL_PROFILE_ARG=""
          if [ -n "${{ inputs.tool-profile }}" ]; then
            TOOL_PROFILE_ARG="--tool-profile ${{ inputs.tool-profile }}"
          fi
          openclaw agent --session-id ${{ inputs.session-id }} --message "$MESSAGE" --thinking high $TOOL_PROFILE_ARG

      - name: Sync Memory Back
        run: |
          if [ -d ~/.openclaw/${{ inputs.workspace-name }} ] && [ "$(ls -A ~/.openclaw/${{ inputs.workspace-name }} 2>/dev/null)" ]; then
            cp -r ~/.openclaw/${{ inputs.workspace-name }}/* ${{ inputs.memory-path }}/ || echo "Warning: Some files could not be copied"
          else
            echo "Warning: No workspace files to sync back"
          fi
          # Sync additional paths back to repo
          for path in ${{ inputs.additional-sync-paths }}; do
            filename=$(basename "$path")
            if [ -f ~/.openclaw/${{ inputs.workspace-name }}/"$filename" ]; then
              cp ~/.openclaw/${{ inputs.workspace-name }}/"$filename" "$path" 2>/dev/null || true
            fi
          done

      - name: Commit Memory Changes
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ inputs.commit-message }}
          commit_user_name: ${{ inputs.commit-user-name }}
          commit_user_email: ${{ inputs.commit-user-email }}
          file_pattern: ${{ inputs.memory-path }}/ ${{ inputs.additional-sync-paths }}

      - name: Upload Diagnostic Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.session-id }}-logs-${{ github.run_id }}
          path: /tmp/openclaw/openclaw-*.log
          retention-days: 7
