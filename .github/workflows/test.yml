name: Validation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Config Template
        run: |
          # Check template exists and has required fields
          if [ ! -f "config/openclaw.json.template" ]; then
            echo "ERROR: Config template not found"
            exit 1
          fi

          # Check for required placeholders
          grep -q 'BAILIAN_API_KEY' config/openclaw.json.template || { echo "ERROR: Missing BAILIAN_API_KEY"; exit 1; }
          grep -q 'GEMINI_API_KEY' config/openclaw.json.template || { echo "ERROR: Missing GEMINI_API_KEY"; exit 1; }
          grep -q 'GATEWAY_PORT' config/openclaw.json.template || { echo "ERROR: Missing GATEWAY_PORT"; exit 1; }

          echo "✓ Config template valid"

      - name: Validate Memory Structure
        run: |
          # Check required memory files exist
          REQUIRED_FILES=(
            "memory/AGENTS.md"
            "memory/SOUL.md"
            "memory/MEMORY.md"
            "memory/skills/stock-picker/SKILL.md"
            "memory/skills/stock-picker/VALUATION.md"
            "memory/skills/stock-picker/CHECKLISTS.md"
            "memory/skills/stock-picker/SOURCES.md"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing required file: $file"
              exit 1
            fi
          done

          echo "✓ All required memory files present"

      - name: Lint Shell Scripts
        run: |
          # Install shellcheck
          sudo apt-get update
          sudo apt-get install -y shellcheck

          # Lint all shell scripts
          for script in scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "Checking $script..."
              shellcheck "$script" || exit 1
            fi
          done

          echo "✓ All shell scripts pass linting"

      - name: Validate Workflow Syntax
        run: |
          # Basic YAML syntax check for workflows
          for workflow in .github/workflows/*.yml; do
            if [ -f "$workflow" ]; then
              echo "Checking $workflow..."
              # Check for common issues
              grep -E '^\s*\t' "$workflow" && { echo "ERROR: Tabs found in $workflow (use spaces)"; exit 1; } || true
            fi
          done

          echo "✓ Workflow syntax valid"

      - name: Check for Silent Failures
        run: |
          # Ensure no || true patterns that hide errors
          if grep -r '|| true' .github/workflows/ --include="*.yml"; then
            echo "WARNING: Found '|| true' patterns that may hide failures"
            echo "Consider using proper error handling instead"
          fi

          echo "✓ Silent failure check complete"

      - name: Summary
        run: |
          echo "=== Validation Summary ==="
          echo "✓ All checks passed"
          echo ""
          echo "Memory files: $(find memory -name '*.md' | wc -l)"
          echo "Scripts: $(find scripts -name '*.sh' 2>/dev/null | wc -l)"
          echo "Workflows: $(find .github/workflows -name '*.yml' | wc -l)"
