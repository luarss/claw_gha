name: Portfolio Advisor Agent

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to portfolio advisor'
        required: true
        default: 'Review portfolio allocation and provide recommendations'

concurrency:
  group: portfolio-advisor-agent
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-agent:
    uses: ./.github/workflows/_agent-template.yml
    with:
      session-id: portfolio-advisor
      default-message: 'Review portfolio allocation and provide recommendations'
      workspace-name: workspace-portfolio-advisor
      memory-path: memory/portfolio-advisor
      commit-message: 'chore: update portfolio-advisor memory [skip ci]'
      commit-user-name: 'Portfolio Advisor Agent'
      commit-user-email: 'portfolio-advisor@users.noreply.github.com'
      otel-service-name: openclaw-portfolio-advisor-gha
      thinking: high
    secrets: inherit
