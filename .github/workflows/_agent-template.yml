name: Agent Template

on:
  workflow_call:
    inputs:
      session-id:
        required: true
        type: string
      default-message:
        required: true
        type: string
      workspace-name:
        required: true
        type: string
      memory-path:
        required: true
        type: string
      additional-sync-paths:
        required: false
        type: string
        default: ''
      commit-message:
        required: true
        type: string
      commit-user-name:
        required: true
        type: string
      commit-user-email:
        required: true
        type: string
      otel-service-name:
        required: true
        type: string
      thinking:
        required: false
        type: string
        default: ''
        description: 'Thinking level: high, medium, low, or empty for none'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
  OTEL_SERVICE_NAME: ${{ inputs.otel-service-name }}

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm-global
            ~/.cache/ms-playwright
          # Bump v2 → v3 etc. when a new openclaw version must be forced
          key: deps-${{ runner.os }}-v3-${{ hashFiles('.github/workflows/_agent-template.yml') }}

      - name: Install OpenClaw
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix '~/.npm-global'
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH
          echo "NODE_PATH=$HOME/.npm-global/lib/node_modules" >> $GITHUB_ENV
          npm install -g openclaw@latest
          npm install -g @opentelemetry/api @opentelemetry/api-logs @opentelemetry/sdk-node @opentelemetry/sdk-metrics @opentelemetry/sdk-logs @opentelemetry/sdk-trace-base @opentelemetry/resources @opentelemetry/semantic-conventions @opentelemetry/exporter-trace-otlp-proto @opentelemetry/exporter-metrics-otlp-proto @opentelemetry/exporter-logs-otlp-proto

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Install Skills from ClawHub
        continue-on-error: true
        env:
          CLAWHUB_API_KEY: ${{ secrets.CLAWHUB_API_KEY }}
        run: |
          if [ -n "$CLAWHUB_API_KEY" ]; then
            npx clawhub@latest login --no-browser --token "$CLAWHUB_API_KEY" || echo "ClawHub login failed, continuing without skills"
          fi
          npx clawhub@latest install self-improving-agent || echo "ClawHub install failed, continuing without skills"

      - name: Sanitize Input
        env:
          RAW_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          SANITIZED=$(echo "$RAW_MESSAGE" | sed 's/[`$\\]//g' | tr -d '\n' | head -c 1000)
          echo "MESSAGE=${SANITIZED:-${{ inputs.default-message }}}" >> $GITHUB_ENV

      - name: Validate Secrets
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          missing=()
          [ -z "$BAILIAN_API_KEY" ] && missing+=("BAILIAN_API_KEY")
          [ -z "$GEMINI_API_KEY" ] && missing+=("GEMINI_API_KEY")
          [ -z "$FINNHUB_API_KEY" ] && missing+=("FINNHUB_API_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets present."

      - name: Configure OpenClaw
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINANCIALDATA_API_KEY: ${{ secrets.FINANCIALDATA_API_KEY }}
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          GATEWAY_PORT: 18789
        run: |
          # Clean workspace to prevent stale files from a reused runner
          WORKSPACE=~/.openclaw/${{ inputs.workspace-name }}
          rm -rf "$WORKSPACE"
          mkdir -p "$WORKSPACE"
          # Create memory subdirectory for daily logs (per OpenClaw docs)
          mkdir -p "$WORKSPACE/memory"

          echo "=== Copying memory files to workspace ==="
          echo "Source: ${{ inputs.memory-path }}"
          echo "Dest: $WORKSPACE"
          if [ ! -d "${{ inputs.memory-path }}" ] || [ -z "$(ls -A ${{ inputs.memory-path }} 2>/dev/null)" ]; then
            echo "ERROR: Memory path ${{ inputs.memory-path }} is empty or missing"
            exit 1
          fi
          cp -rv ${{ inputs.memory-path }}/* "$WORKSPACE/"
          echo "=== Files copied successfully ==="

          # Copy additional sync paths to .shared/ subfolder in workspace
          # This keeps shared files separate from agent's own memory files
          if [ -n "${{ inputs.additional-sync-paths }}" ]; then
            mkdir -p "$WORKSPACE/.shared"
            IFS=' ' read -ra EXTRA_PATHS <<< "${{ inputs.additional-sync-paths }}"
            for path in "${EXTRA_PATHS[@]}"; do
              [ -z "$path" ] && continue
              if [ -f "$path" ]; then
                filename=$(basename "$path")
                echo "Copying additional file: $path -> .shared/$filename"
                cp "$path" "$WORKSPACE/.shared/$filename"
              elif [ -d "$path" ]; then
                dirname=$(basename "$path")
                echo "Copying additional dir: $path -> .shared/$dirname/"
                cp -r "$path" "$WORKSPACE/.shared/"
              else
                echo "WARNING: additional-sync-path not found: $path"
              fi
            done
          fi

          # Verify workspace contents
          echo "=== Workspace contents after copy ==="
          ls -la "$WORKSPACE/"
          if [ -d "$WORKSPACE/.shared" ]; then
            echo "=== Shared files ==="
            ls -la "$WORKSPACE/.shared/"
          fi
          export HOME
          envsubst < config/openclaw.json.template > ~/.openclaw/openclaw.json

      - name: Start Gateway
        run: |
          openclaw gateway --port 18789 &
          GATEWAY_PID=$!
          # Exponential-ish backoff: wait up to ~87s total
          for i in 1 2 3 4 5 6 10 15 20 30; do
            sleep $i
            if curl -sf "http://localhost:18789/health" > /dev/null 2>&1; then
              echo "Gateway healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: Gateway failed to start. Process status:"
              ps aux | grep openclaw || true
              kill $GATEWAY_PID 2>/dev/null || true
              exit 1
            fi
          done

      - name: Run Agent
        timeout-minutes: 15
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINANCIALDATA_API_KEY: ${{ secrets.FINANCIALDATA_API_KEY }}
        run: |
          THINKING_FLAG=""
          if [ -n "${{ inputs.thinking }}" ]; then
            THINKING_FLAG="--thinking ${{ inputs.thinking }}"
          fi
          openclaw agent --agent ${{ inputs.session-id }} --session-id ${{ inputs.session-id }} --message "$MESSAGE" $THINKING_FLAG

      - name: Enforce File Writes
        timeout-minutes: 5
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINANCIALDATA_API_KEY: ${{ secrets.FINANCIALDATA_API_KEY }}
        run: |
          WORKSPACE=~/.openclaw/${{ inputs.workspace-name }}
          MEMORY=${{ inputs.memory-path }}
          # Exclude .shared from diff since it's a staging area, not original memory
          changed=$(diff -rq --exclude='.gitkeep' --exclude='.shared' "$MEMORY" "$WORKSPACE" 2>/dev/null | wc -l)
          if [ "$changed" -eq 0 ]; then
            echo "Agent produced no file changes — sending write-enforcement follow-up..."
            THINKING_FLAG=""
            if [ -n "${{ inputs.thinking }}" ]; then
              THINKING_FLAG="--thinking ${{ inputs.thinking }}"
            fi
            openclaw agent --agent ${{ inputs.session-id }} --session-id ${{ inputs.session-id }} \
              --message "STOP. You have NOT written any files yet. You MUST now call the Write tool. Step 1: call Write tool with file_path='research-queue.md' containing all the signals you just researched. Step 2: call Write tool with file_path='MEMORY.md' with a session log prepended to the existing content. Invoking Write tool is the ONLY way to save. Do it now." \
              $THINKING_FLAG
          else
            echo "Agent produced $changed file change(s) — skipping write enforcement."
          fi

      - name: Verify Agent Output
        run: |
          WORKSPACE=~/.openclaw/${{ inputs.workspace-name }}
          MEMORY=${{ inputs.memory-path }}
          # Exclude .shared from diff since it's a staging area, not original memory
          changed=$(diff -rq --exclude='.gitkeep' --exclude='.shared' "$MEMORY" "$WORKSPACE" 2>/dev/null | wc -l)
          if [ "$changed" -eq 0 ]; then
            echo "WARNING: Agent produced no file changes after enforcement. Agent may have fundamentally failed."
          else
            echo "Agent produced $changed file change(s). Memory sync proceeding."
          fi
          echo "AGENT_CHANGED=$changed" >> $GITHUB_ENV

      - name: Debug Workspace Contents
        run: |
          echo "=== WORKSPACE CONTENTS ==="
          echo "--- ~/.openclaw/${{ inputs.workspace-name }}/ ---"
          ls -laR ~/.openclaw/${{ inputs.workspace-name }}/ 2>/dev/null || echo "Directory not found or empty"
          echo ""
          echo "=== MEMORY PATH BEFORE SYNC ==="
          echo "--- ${{ inputs.memory-path }}/ ---"
          ls -laR ${{ inputs.memory-path }}/ 2>/dev/null || echo "Directory not found or empty"
          echo ""
          echo "=== REPO ROOT ==="
          ls -la

      - name: Sync Memory Back
        run: |
          WORKSPACE=~/.openclaw/${{ inputs.workspace-name }}

          # Sync main workspace files back to repo memory path
          rsync -av --checksum \
            "$WORKSPACE/" \
            ${{ inputs.memory-path }}/ \
            --exclude='.git' \
            --exclude='.shared'

          # Sync shared files back to their original repo locations
          if [ -d "$WORKSPACE/.shared" ]; then
            IFS=' ' read -ra EXTRA_PATHS <<< "${{ inputs.additional-sync-paths }}"
            for path in "${EXTRA_PATHS[@]}"; do
              [ -z "$path" ] && continue
              filename=$(basename "$path")
              src="$WORKSPACE/.shared/$filename"
              if [ -f "$src" ]; then
                echo "Syncing shared file back: $src -> $path"
                cp "$src" "$path"
              elif [ -d "$src" ]; then
                echo "Syncing shared dir back: $src -> $path/"
                cp -r "$src/"* "$path/" 2>/dev/null || true
              fi
            done
          fi

      - name: Debug Memory After Sync
        run: |
          echo "=== MEMORY PATH AFTER SYNC ==="
          ls -laR ${{ inputs.memory-path }}/ 2>/dev/null || echo "Directory not found or empty"
          echo ""
          echo "=== GIT STATUS ==="
          git status
          echo ""
          echo "=== GIT DIFF (memory path) ==="
          git diff ${{ inputs.memory-path }}/ || echo "No diff"

      - name: Verify and Force Update
        run: |
          # Check that memory path has content (not just MEMORY.md specifically)
          MEMORY_PATH=${{ inputs.memory-path }}
          if [ ! -d "$MEMORY_PATH" ]; then
            echo "ERROR: Memory path $MEMORY_PATH does not exist"
            exit 1
          fi

          md_count=$(find "$MEMORY_PATH" -type f -name "*.md" 2>/dev/null | wc -l)
          if [ "$md_count" -eq 0 ]; then
            echo "ERROR: No .md files found in $MEMORY_PATH — memory structure corrupted"
            exit 1
          fi
          echo "Found $md_count .md files in memory path"

          # Append timestamp to MEMORY.md if it exists and agent made changes
          MEMORY_FILE="$MEMORY_PATH/MEMORY.md"
          if [ "${AGENT_CHANGED:-0}" -gt 0 ]; then
            if [ -f "$MEMORY_FILE" ]; then
              echo "" >> "$MEMORY_FILE"
              echo "<!-- Last run: $(date -u +%Y-%m-%dT%H:%M:%SZ) -->" >> "$MEMORY_FILE"
              echo "Updated MEMORY.md with timestamp"
            else
              echo "WARNING: MEMORY.md not found at $MEMORY_FILE — skipping timestamp"
            fi
          else
            echo "Skipping timestamp — agent produced no changes."
          fi

          echo "=== Files in memory path after agent run ==="
          find "$MEMORY_PATH/" -type f -name "*.md" 2>/dev/null || echo "No .md files found"

      - name: Commit Memory Changes
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ inputs.commit-message }}
          commit_user_name: ${{ inputs.commit-user-name }}
          commit_user_email: ${{ inputs.commit-user-email }}
          file_pattern: ${{ inputs.memory-path }}/ ${{ inputs.additional-sync-paths }}

      - name: Upload Diagnostic Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.session-id }}-logs-${{ github.run_id }}
          path: /tmp/openclaw/openclaw-*.log
          retention-days: 7
